<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max測試專區</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Max Test Area</p>
        <h1>Max測試專區</h1>
      </div>
      <div class="header-status">
        <p class="header-meta" id="updateDate">目前更新到 --</p>
        <p class="live-time" id="liveTime">現在時間 --</p>
      </div>
    </header>

    <main>
      <section class="home-panel" id="homePanel" aria-label="主頁入口">
        <article class="market-card" aria-label="即時大盤資訊">
          <div class="market-head">
            <div>
              <p class="eyebrow">Market</p>
              <h2>即時大盤資訊</h2>
            </div>
            <span class="market-source">TWSE</span>
          </div>
          <div class="market-main">
            <span class="market-label">加權指數</span>
            <strong class="market-index" id="marketIndex">讀取中</strong>
            <span class="market-change" id="marketChange">--</span>
          </div>
          <dl class="market-grid">
            <div>
              <dt>資料時間</dt>
              <dd id="marketTime">--</dd>
            </div>
            <div>
              <dt>日內高點</dt>
              <dd id="marketHigh">--</dd>
            </div>
            <div>
              <dt>日內低點</dt>
              <dd id="marketLow">--</dd>
            </div>
            <div>
              <dt>資料日期</dt>
              <dd id="marketDate">--</dd>
            </div>
          </dl>
          <div class="market-chart" aria-label="加權指數日內 K 線圖"><div class="chart-head"><span>日內 5 分鐘 K 線</span><span id="chartRange">--</span></div><svg id="marketKChart" viewBox="0 0 720 260" role="img" aria-label="加權指數日內 5 分鐘 K 線圖"></svg></div><p class="market-note" id="marketNote">來源：臺灣證券交易所每 5 秒指數統計。頁面約每 60 秒更新一次。</p>
        </article>

        <button class="zone-card" id="haoZoneButton" type="button">
          <span class="zone-label">皓哥專區</span>
          <span class="zone-desc">查看皓哥開示摘要圖</span>
          <span class="zone-action">進入</span>
        </button>
      </section>

      <section class="layout" id="haoZone" aria-label="皓哥專區" hidden>
        <section class="gallery" aria-label="摘要圖列表" id="gallery"></section>

        <section class="viewer" aria-label="圖片預覽">
          <div class="viewer-header">
            <div>
              <p class="eyebrow">皓哥專區</p>
              <h2 id="viewerTitle">皓哥開示摘要圖</h2>
            </div>
            <div class="viewer-actions">
              <button class="home-button" id="homeButton" type="button">返回主頁</button>
              <a class="open-link" id="openImage" href="#" target="_blank" rel="noreferrer">開啟封面</a>
            </div>
          </div>
          <div class="image-frame">
            <img id="mainImage" alt="摘要圖預覽" />
            <p class="empty-state" id="emptyState">從左側選一個日期開始查看。</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
