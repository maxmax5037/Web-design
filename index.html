<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Max測試專區</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">Max Test Area</p>
        <h1>Max測試專區</h1>
      </div>
      <div class="header-status">
        <p class="header-meta" id="updateDate">目前更新到 --</p>
        <p class="live-time" id="liveTime">現在時間 --</p>
      </div>
    </header>

    <main>
      <section class="home-panel" id="homePanel" aria-label="主頁入口">
        <article class="market-card market-card-google" aria-label="即時大盤資訊">
          <div class="market-title-row">
            <div>
              <h2 class="market-name">加權指數</h2>
              <p class="market-symbol">TPE: IX0001 <span aria-hidden="true">︙</span></p>
            </div>
            <span class="market-source">TWSE</span>
          </div>

          <div class="market-quote">
            <strong class="market-index" id="marketIndex">讀取中</strong>
            <span class="market-change" id="marketChange">--</span>
            <p class="market-stamp"><span id="marketDate">--</span> <span id="marketTime">--</span> GMT+8 · <span class="market-disclaimer">免責聲明</span></p>
          </div>

          <nav class="range-tabs" aria-label="圖表期間">
            <button class="range-tab is-active" type="button">1 天</button>
            <button class="range-tab" type="button">5 天</button>
            <button class="range-tab" type="button">1 個月</button>
            <button class="range-tab" type="button">6 個月</button>
            <button class="range-tab" type="button">本年迄今</button>
            <button class="range-tab" type="button">1 年</button>
            <button class="range-tab" type="button">5 年</button>
            <button class="range-tab" type="button">最久</button>
          </nav>

          <div class="market-chart" aria-label="加權指數日內走勢圖">
            <svg id="marketKChart" viewBox="0 0 760 250" role="img" aria-label="加權指數日內走勢圖"></svg>
          </div>

          <dl class="market-stats">
            <div><dt>開盤</dt><dd id="marketOpen">--</dd></div>
            <div><dt>最低</dt><dd id="marketLow">--</dd></div>
            <div><dt>52 週高點</dt><dd id="marketHigh52">--</dd></div>
            <div><dt>最高</dt><dd id="marketHigh">--</dd></div>
            <div><dt>上次收盤價</dt><dd id="marketPrevClose">--</dd></div>
            <div><dt>52 週低點</dt><dd id="marketLow52">--</dd></div>
          </dl>
          <p class="market-note" id="marketNote">來源：臺灣證券交易所每 5 秒指數統計。頁面約每 60 秒更新一次。</p>
        </article>

        <button class="zone-card" id="haoZoneButton" type="button">
          <span class="zone-label">皓哥專區</span>
          <span class="zone-desc">查看皓哥開示摘要圖</span>
          <span class="zone-action">進入</span>
        </button>
      </section>

      <section class="layout" id="haoZone" aria-label="皓哥專區" hidden>
        <section class="gallery" aria-label="摘要圖列表" id="gallery"></section>

        <section class="viewer" aria-label="圖片預覽">
          <div class="viewer-header">
            <div>
              <p class="eyebrow">皓哥專區</p>
              <h2 id="viewerTitle">皓哥開示摘要圖</h2>
            </div>
            <div class="viewer-actions">
              <button class="home-button" id="homeButton" type="button">返回主頁</button>
              <a class="open-link" id="openImage" href="#" target="_blank" rel="noreferrer">開啟封面</a>
            </div>
          </div>
          <div class="image-frame">
            <img id="mainImage" alt="摘要圖預覽" />
            <p class="empty-state" id="emptyState">從左側選一個日期開始查看。</p>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/app.js"></script>
  </body>
</html>
